name: Generate SDKs

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Generate TypeScript SDK
        run: openapi-generator-cli generate -i ./openapi/project-nexus-core.yaml -g typescript-fetch -o ./sdk/generated/typescript -c ./openapi/generator/typescript-config.json --skip-validate-spec

      - name: Generate Python SDK
        run: openapi-generator-cli generate -i ./openapi/project-nexus-core.yaml -g python -o ./sdk/generated/python -c ./openapi/generator/python-config.json --skip-validate-spec

      - name: Upload generated SDK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-nexus-sdks
          path: sdk/generated
